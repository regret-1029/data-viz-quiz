<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数据可视化 期末刷题</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f0f2f5; color: #333; line-height: 2; min-height: 100vh;
}
.container { max-width: 960px; margin: 0 auto; padding: 20px; }

/* ===== Header ===== */
.header {
  position: sticky; top: 0; z-index: 100; background: #fff;
  border-bottom: 1px solid #e8e8e8; padding: 14px 20px; margin-bottom: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
}
.header .progress { font-size: 17px; font-weight: 600; color: #1a73e8; }
.header .nav-btns { display: flex; gap: 8px; flex-wrap: wrap; }

/* ===== Nav Panel ===== */
.nav-panel {
  background: #fff; border-radius: 14px; padding: 18px 22px; margin-bottom: 20px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: none;
}
.nav-panel.open { display: block; }
.nav-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(48px, 1fr));
  gap: 6px; margin-top: 10px;
}
.nav-num {
  display: flex; align-items: center; justify-content: center;
  padding: 8px 0; border-radius: 8px; font-size: 15px; font-weight: 600;
  cursor: pointer; border: 2px solid #e0e0e0; background: #fff; transition: all 0.15s;
}
.nav-num:hover { border-color: #90caf9; background: #e3f2fd; transform: scale(1.08); }
.nav-num.active { border-color: #1a73e8; background: #1a73e8; color: #fff; }
.nav-num.done { border-color: #43a047; background: #e8f5e9; }
.nav-num.wrong { border-color: #e53935; background: #ffebee; color: #c62828; }
.nav-num.unsub { border-color: #fff3e0; background: #fff3e0; color: #e65100; }

/* ===== Card ===== */
.card { background: #fff; border-radius: 16px; padding: 28px 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }

/* ===== Badge ===== */
.badge { display: inline-block; padding: 5px 14px; border-radius: 6px; font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.badge-single { background: #e3f2fd; color: #1565c0; }
.badge-judge { background: #fff3e0; color: #e65100; }
.badge-fill { background: #e8f5e9; color: #2e7d32; }
.badge-material { background: #f3e5f5; color: #6a1b9a; }

/* ===== Material Context ===== */
.material-context {
  background: #fff8e1; border-left: 5px solid #ffa000; border-radius: 8px;
  padding: 16px 20px; margin-bottom: 18px; font-size: 16px; line-height: 1.8;
}
.material-context strong { color: #e65100; }

/* ===== Question ===== */
.question-text { font-size: 19px; font-weight: 500; margin-bottom: 20px; line-height: 1.9; }

/* ===== Options ===== */
.options { display: flex; flex-direction: column; gap: 12px; margin-bottom: 14px; }
.option-item {
  display: flex; align-items: center; gap: 14px; padding: 14px 18px;
  border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer;
  transition: all 0.15s; font-size: 17px;
}
.option-item:hover { border-color: #90caf9; background: #f5f9ff; }
.option-item input[type="radio"] { accent-color: #1a73e8; transform: scale(1.3); }
.option-item.correct { border-color: #43a047; background: #e8f5e9; }
.option-item.wrong { border-color: #e53935; background: #ffebee; }
.option-item.locked { pointer-events: none; opacity: 0.85; }

/* ===== Fill input ===== */
.fill-input {
  width: 100%; padding: 14px 18px; font-size: 17px; border: 2px solid #e0e0e0;
  border-radius: 10px; outline: none; transition: border-color 0.15s; margin-bottom: 14px;
}
.fill-input:focus { border-color: #1a73e8; }
.fill-input.locked { background: #f5f5f5; pointer-events: none; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 10px 22px; border: none; border-radius: 10px; font-size: 16px;
  font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: #1a73e8; color: #fff; }
.btn-primary:hover { background: #1557b0; }
.btn-primary:disabled { background: #93b8f0; cursor: not-allowed; transform: none; }
.btn-success { background: #43a047; color: #fff; }
.btn-success:hover { background: #2e7d32; }
.btn-success:disabled { background: #a5d6a7; cursor: not-allowed; transform: none; }
.btn-outline { background: transparent; color: #555; border: 2px solid #ddd; }
.btn-outline:hover { border-color: #999; background: #f5f5f5; }
.btn-outline:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.btn-danger { background: #e53935; color: #fff; }
.btn-danger:hover { background: #c62828; }
.btn-sm { padding: 6px 14px; font-size: 13px; }

.action-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }

/* ===== Result ===== */
.result-box { margin-top: 16px; padding: 16px 20px; border-radius: 10px; font-size: 16px; line-height: 1.9; }
.result-correct { background: #e8f5e9; border-left: 5px solid #43a047; }
.result-wrong { background: #ffebee; border-left: 5px solid #e53935; }
.result-box .answer-line { margin-top: 6px; }
.result-box .explain-line { margin-top: 6px; color: #555; }

/* ===== Stats ===== */
.stats-card { text-align: center; padding: 40px 28px; }
.stats-title { font-size: 24px; font-weight: 700; margin-bottom: 24px; }
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 400px; margin: 0 auto 24px; }
.stat-item { background: #f5f7fa; border-radius: 12px; padding: 18px; }
.stat-value { font-size: 30px; font-weight: 700; color: #1a73e8; }
.stat-label { font-size: 14px; color: #888; margin-top: 4px; }
.stat-item.green .stat-value { color: #43a047; }
.stat-item.red .stat-value { color: #e53935; }
.stat-item.orange .stat-value { color: #fb8c00; }
.rate-ring { width: 120px; height: 120px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 14px; }
.stats-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

/* ===== Wrong list ===== */
.wrong-item { padding: 16px 0; border-bottom: 1px solid #eee; text-align: left; }
.wrong-item:last-child { border-bottom: none; }
.wrong-q { font-weight: 500; margin-bottom: 8px; font-size: 17px; }
.wrong-detail { font-size: 15px; color: #666; line-height: 1.8; }
.wrong-detail .label { color: #888; }
.wrong-detail .your-ans { color: #e53935; font-weight: 600; }
.wrong-detail .correct-ans { color: #43a047; font-weight: 600; }

/* ===== Code Reference ===== */
.code-ref { margin-bottom: 18px; }
.code-ref-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
.code-block {
  background: #1e1e1e; color: #d4d4d4; border-radius: 10px; padding: 18px 20px;
  font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
  font-size: 14px; line-height: 1.7; overflow-x: auto; white-space: pre-wrap; word-break: break-word;
  margin-bottom: 10px; display: none;
}
.code-block.open { display: block; }
.code-steps { font-size: 15px; color: #555; background: #f5f7fa; padding: 10px 16px; border-radius: 8px; margin-bottom: 10px; }

/* ===== Short Answer Review ===== */
.review-item { padding: 12px 0; border-bottom: 1px solid #eee; }
.review-item:last-child { border-bottom: none; }
.review-q { font-weight: 600; font-size: 17px; }
.review-a { font-size: 15px; color: #555; margin-top: 6px; }

/* ===== History ===== */
.history-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid #eee; flex-wrap: wrap; gap: 8px;
}

/* ===== Utility ===== */
.hidden { display: none !important; }
.text-center { text-align: center; }

@media (max-width: 600px) {
  .container { padding: 12px; }
  .card { padding: 18px 16px; }
  .header { padding: 10px 12px; }
  .header .progress { font-size: 14px; }
  .question-text { font-size: 17px; }
  .option-item { font-size: 15px; padding: 10px 12px; }
  .nav-grid { grid-template-columns: repeat(auto-fill, minmax(40px, 1fr)); gap: 5px; }
  .nav-num { font-size: 13px; padding: 6px 0; }
  .stats-grid { gap: 10px; }
  .stat-value { font-size: 24px; }
  .btn { padding: 8px 16px; font-size: 14px; }
  .badge { font-size: 13px; }
  .code-block { font-size: 13px; padding: 12px 14px; }
}
</style>
</head>
<body>
<div class="container" id="app">
  <!-- Header -->
  <div class="header">
    <span class="progress" id="progressText">第 1 题 / 共 109 题</span>
    <div class="nav-btns">
      <button class="btn btn-outline btn-sm" onclick="toggleNav()">题号</button>
      <button class="btn btn-outline btn-sm" onclick="showCodeRef()">代码</button>
      <button class="btn btn-outline btn-sm" onclick="showWrongList()">错题</button>
      <button class="btn btn-outline btn-sm" onclick="showHistory()">历史</button>
      <button class="btn btn-outline btn-sm" onclick="submitAll()">交卷</button>
      <button class="btn btn-outline btn-sm" onclick="prevQuestion()">←</button>
      <button class="btn btn-outline btn-sm" onclick="nextQuestion()">→</button>
    </div>
  </div>

  <!-- Navigation Panel -->
  <div class="nav-panel" id="navPanel">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:6px;">
      <span style="font-size:13px;font-weight:600;color:#555;">选择题目</span>
      <div style="display:flex;gap:8px;font-size:11px;color:#888;">
        <span>⬜ 未答</span>
        <span>🟧 未提交</span>
        <span>🟢 正确</span>
        <span>🔴 错误</span>
      </div>
    </div>
    <div class="nav-grid" id="navGrid"></div>
  </div>

  <!-- Question Area -->
  <div id="questionArea">
    <div class="card">
      <div id="materialContext" class="material-context hidden">
        <strong>A集团健身房背景：</strong>标准店、高端旗舰店、24小时自助店三种业态，CDO需准备年度报告。以下为各业务场景推荐图表选择。
      </div>
      <div id="badgeArea"></div>
      <div class="question-text" id="questionText"></div>
      <div id="optionsArea"></div>
      <div id="fillArea" class="hidden">
        <input type="text" class="fill-input" id="fillInput" placeholder="请输入答案..." autocomplete="off">
      </div>
      <div class="action-btns hidden" id="actionBtns">
        <button class="btn btn-primary hidden" id="submitBtn">提交本题</button>
      </div>
      <div id="resultArea" class="hidden"></div>
    </div>
  </div>

  <!-- Code Reference Page -->
  <div id="codeRefPage" class="hidden">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <h3 style="font-size:16px;">代码参考（简答题必考）</h3>
        <button class="btn btn-outline btn-sm" onclick="render()">← 返回答题</button>
      </div>
      <div id="codeRefContent"></div>
    </div>
  </div>

  <!-- Stats Page -->
  <div id="statsPage" class="hidden">
    <div class="card stats-card">
      <div class="stats-title">答题结果</div>
      <div id="rateRing" class="rate-ring" style="background:#1a73e8;"></div>
      <div class="stats-grid" id="statsGrid"></div>
      <div class="stats-actions">
        <button class="btn btn-primary btn-sm" onclick="showWrongList()">查看错题</button>
        <button class="btn btn-outline btn-sm" onclick="showHistory()">历史记录</button>
        <button class="btn btn-outline btn-sm" onclick="showCodeRef()">代码参考</button>
        <button class="btn btn-danger btn-sm" onclick="saveAndReset()">重新刷题</button>
      </div>
    </div>
  </div>

  <!-- Wrong List Page -->
  <div id="wrongPage" class="hidden">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <h3 style="font-size:16px;">错题列表</h3>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-outline btn-sm" onclick="showStats()">成绩</button>
          <button class="btn btn-outline btn-sm" onclick="render()">答题</button>
        </div>
      </div>
      <div id="wrongListContent"></div>
    </div>
  </div>

  <!-- History Page -->
  <div id="historyPage" class="hidden">
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <h3 style="font-size:16px;">历史记录</h3>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-outline btn-sm" onclick="render()">答题</button>
          <button class="btn btn-outline btn-sm" onclick="clearHistory()">清空历史</button>
        </div>
      </div>
      <div id="historyContent"></div>
    </div>
  </div>
</div>

<script>
// ========== Data ==========

const TOTAL = questions.length;

// ========== State ==========
let currentQ = 0;
let userAnswers = new Array(TOTAL).fill(null);
let submitted = new Array(TOTAL).fill(false);
let results = new Array(TOTAL).fill(null);
let navOpen = false;

// ========== Helpers ==========
function getDisplayAnswer(q, ansLetter) {
  if (ansLetter === null || ansLetter === undefined) return '(未作答)';
  if (q.type === '判断题') return ansLetter === 'A' ? '对' : '错';
  if (q.type === '填空题' || !q.options) return ansLetter;
  const idx = ansLetter.charCodeAt(0) - 65;
  return (q.options[idx] || ansLetter);
}

function getNavStatus(i) {
  if (results[i] === null) return 'unanswered';
  if (!submitted[i]) return 'unsubmitted';
  return results[i].correct ? 'correct' : 'wrong';
}

// ========== Nav ==========
function toggleNav() {
  navOpen = !navOpen;
  document.getElementById('navPanel').classList.toggle('open', navOpen);
  if (navOpen) renderNavGrid();
}

function renderNavGrid() {
  let html = '';
  for (let i = 0; i < TOTAL; i++) {
    const q = questions[i];
    let cls = 'nav-num';
    if (i === currentQ) cls += ' active';
    else {
      const st = getNavStatus(i);
      if (st === 'correct') cls += ' done';
      else if (st === 'wrong') cls += ' wrong';
      else if (st === 'unsubmitted') cls += ' unsub';
    }
    html += `<a class="${cls}" onclick="jumpTo(${i})" title="${q.type}: ${q.question.substring(0,40)}">${i+1}</a>`;
  }
  document.getElementById('navGrid').innerHTML = html;
}

function jumpTo(idx) {
  currentQ = idx;
  navOpen = false;
  document.getElementById('navPanel').classList.remove('open');
  render();
}

// ========== Render ==========
function render() {
  const q = questions[currentQ];
  const isSubmitted = submitted[currentQ];

  // Progress
  let totalDone = results.filter(r => r !== null).length;
  document.getElementById('progressText').textContent =
    `第 ${currentQ + 1} / ${TOTAL} 题（已答 ${totalDone} 题）`;

  // Material context (only for 75.x)
  const matCtx = document.getElementById('materialContext');
  if (q.number.startsWith('75.')) {
    matCtx.classList.remove('hidden');
  } else {
    matCtx.classList.add('hidden');
  }

  // Badge
  const badgeMap = {
    '单选题': '<span class="badge badge-single">【单选题】</span>',
    '判断题': '<span class="badge badge-judge">【判断题】</span>',
    '填空题': '<span class="badge badge-fill">【填空题】</span>',
    '材料分析题': '<span class="badge badge-material">【材料分析题】</span>'
  };
  document.getElementById('badgeArea').innerHTML = badgeMap[q.type] || '';

  // Question text - show original content as-is
  document.getElementById('questionText').textContent = q.question;

  // Options or fill
  const optArea = document.getElementById('optionsArea');
  const fillArea = document.getElementById('fillArea');
  const fillInput = document.getElementById('fillInput');

  if (q.type === '填空题') {
    optArea.classList.add('hidden');
    optArea.innerHTML = '';
    fillArea.classList.remove('hidden');
    fillInput.value = userAnswers[currentQ] || '';
    fillInput.disabled = isSubmitted;
    fillInput.className = 'fill-input' + (isSubmitted ? ' locked' : '');
    if (!isSubmitted) {
      fillInput.onblur = function() { autoSubmitFill(); };
      fillInput.onkeydown = function(e) { if (e.key === 'Enter') { autoSubmitFill(); } };
    } else {
      fillInput.onblur = null;
      fillInput.onkeydown = null;
    }
  } else {
    fillArea.classList.add('hidden');
    optArea.classList.remove('hidden');
    const selected = userAnswers[currentQ];
    let html = '<div class="options">';
    q.options.forEach((opt, i) => {
      const letter = String.fromCharCode(65 + i);
      const checked = selected === letter ? 'checked' : '';
      let extraClass = '';
      if (isSubmitted) {
        extraClass = ' locked';
        if (letter === q.answer) extraClass += ' correct';
        else if (letter === selected && letter !== q.answer) extraClass += ' wrong';
      }
      html += `<label class="option-item${extraClass}">
        <input type="radio" name="q${currentQ}" value="${letter}" ${checked} ${isSubmitted ? 'disabled' : ''} onchange="autoSubmit('${letter}')">
        <span>${opt}</span>
      </label>`;
    });
    html += '</div>';
    optArea.innerHTML = html;
  }

  // Submit button - hidden (auto-submit on selection)
  const submitBtn = document.getElementById('submitBtn');
  submitBtn.classList.add('hidden');

  // Result
  const resultArea = document.getElementById('resultArea');
  if (isSubmitted && results[currentQ] !== null) {
    resultArea.classList.remove('hidden');
    const r = results[currentQ];
    let resultHtml = '';
    if (r.correct) {
      resultHtml = `<div class="result-box result-correct">
        <strong>回答正确</strong>
        <div class="explain-line">考点解析：${q.explanation}</div>
      </div>`;
    } else {
      const correctDisplay = getDisplayAnswer(q, q.answer);
      const userDisplay = getDisplayAnswer(q, r.userAnswer);
      resultHtml = `<div class="result-box result-wrong">
        <strong>回答错误</strong>
        <div class="answer-line">你的答案：${userDisplay}</div>
        <div class="answer-line">正确答案：${correctDisplay}</div>
        <div class="explain-line">考点解析：${q.explanation}</div>
      </div>`;
    }
    resultHtml += `<div style="margin-top:10px;"><button class="btn btn-outline btn-sm" onclick="redoQuestion()">重做本题</button></div>`;
    resultArea.innerHTML = resultHtml;
  } else {
    resultArea.classList.add('hidden');
  }

  // Hide other pages
  document.getElementById('questionArea').classList.remove('hidden');
  document.getElementById('statsPage').classList.add('hidden');
  document.getElementById('wrongPage').classList.add('hidden');
  document.getElementById('codeRefPage').classList.add('hidden');
  document.getElementById('historyPage').classList.add('hidden');

  if (navOpen) renderNavGrid();
}

// ========== Actions ==========
function selectOption(val) {
  userAnswers[currentQ] = val;
}

function autoSubmit(val) {
  if (submitted[currentQ]) return;
  userAnswers[currentQ] = val;
  submitAnswer();
}

function autoSubmitFill() {
  if (submitted[currentQ]) return;
  const val = document.getElementById('fillInput').value.trim();
  if (!val) return;
  userAnswers[currentQ] = val;
  submitAnswer();
}

function submitAnswer() {
  if (submitted[currentQ]) return;
  const q = questions[currentQ];
  let userAns;

  if (q.type === '填空题') {
    userAns = document.getElementById('fillInput').value.trim();
    if (!userAns) { alert('请先输入答案！'); return; }
  } else {
    userAns = userAnswers[currentQ];
    if (!userAns) { alert('请先选择一个选项！'); return; }
  }

  userAnswers[currentQ] = userAns;
  submitted[currentQ] = true;

  let correct;
  if (q.type === '填空题') {
    correct = checkFillAnswer(userAns, q.answer);
  } else {
    correct = (userAns === q.answer);
  }

  results[currentQ] = { correct, userAnswer: userAns, correctAnswer: q.answer };
  render();
}

function checkFillAnswer(userAns, correctAns) {
  function norm(s) {
    return s.replace(/\s+/g, '').replace(/[，。、；：！？""''（）【】]/g, function(m) {
      const map = {'，':',','。':'.','、':',','；':';','：':':','！':'!','？':'?','"':'"','"':'"','\'':"'",'（':'(','）':')','【':'[','】':']'};
      return map[m] || m;
    }).toLowerCase();
  }
  return norm(userAns) === norm(correctAns);
}

function nextQuestion() {
  if (currentQ < TOTAL - 1) { currentQ++; render(); }
}

function prevQuestion() {
  if (currentQ > 0) { currentQ--; render(); }
}

function redoQuestion() {
  userAnswers[currentQ] = null;
  submitted[currentQ] = false;
  results[currentQ] = null;
  render();
}

// ========== Code Reference ==========
function showCodeRef() {
  document.getElementById('questionArea').classList.add('hidden');
  document.getElementById('statsPage').classList.add('hidden');
  document.getElementById('wrongPage').classList.add('hidden');
  document.getElementById('codeRefPage').classList.remove('hidden');
  document.getElementById('historyPage').classList.add('hidden');

  let html = '';
  codeRefs.forEach((ref, i) => {
    html += `<div class="code-ref">
      <div class="code-ref-title">${i+1}. ${ref.title}</div>
      <div class="code-steps">核心步骤：${ref.steps}</div>
      <button class="btn btn-outline btn-sm" onclick="toggleCode(${i})" id="codeBtn${i}">显示代码</button>
      <div class="code-block" id="codeBlock${i}">${ref.code.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>
    </div>`;
  });
  document.getElementById('codeRefContent').innerHTML = html;
}

function toggleCode(idx) {
  const block = document.getElementById('codeBlock' + idx);
  const btn = document.getElementById('codeBtn' + idx);
  block.classList.toggle('open');
  btn.textContent = block.classList.contains('open') ? '隐藏代码' : '显示代码';
}

// ========== Stats ==========
function showStats() {
  let correctCount = results.filter(r => r && r.correct).length;
  let wrongCount = results.filter(r => r && !r.correct).length;
  let unanswered = results.filter(r => r === null).length;
  let answered = TOTAL - unanswered;
  let rate = answered > 0 ? Math.round((correctCount / answered) * 100) : 0;

  document.getElementById('questionArea').classList.add('hidden');
  document.getElementById('statsPage').classList.remove('hidden');
  document.getElementById('wrongPage').classList.add('hidden');
  document.getElementById('codeRefPage').classList.add('hidden');
  document.getElementById('historyPage').classList.add('hidden');

  const ring = document.getElementById('rateRing');
  const rateColor = rate >= 80 ? '#43a047' : rate >= 60 ? '#fb8c00' : '#e53935';
  ring.style.background = rateColor;
  ring.textContent = rate + '%';

  document.getElementById('statsGrid').innerHTML =
    `<div class="stat-item"><div class="stat-value">${answered}</div><div class="stat-label">已答题数</div></div>
     <div class="stat-item green"><div class="stat-value">${correctCount}</div><div class="stat-label">答对</div></div>
     <div class="stat-item red"><div class="stat-value">${wrongCount}</div><div class="stat-label">答错</div></div>
     <div class="stat-item orange"><div class="stat-value">${unanswered}</div><div class="stat-label">未答题</div></div>`;
}

// ========== Wrong List ==========
function showWrongList() {
  const wrongs = [];
  questions.forEach((q, i) => {
    if (results[i] && !results[i].correct) {
      wrongs.push({ index: i, q, r: results[i] });
    }
  });

  if (wrongs.length === 0) { alert('没有错题，太棒了！'); return; }

  document.getElementById('questionArea').classList.add('hidden');
  document.getElementById('statsPage').classList.add('hidden');
  document.getElementById('wrongPage').classList.remove('hidden');
  document.getElementById('codeRefPage').classList.add('hidden');
  document.getElementById('historyPage').classList.add('hidden');

  const badgeMap = {
    '单选题': '<span class="badge badge-single">【单选题】</span>',
    '判断题': '<span class="badge badge-judge">【判断题】</span>',
    '填空题': '<span class="badge badge-fill">【填空题】</span>',
    '材料分析题': '<span class="badge badge-material">【材料分析题】</span>'
  };

  let html = '';
  wrongs.forEach(w => {
    const userDisp = getDisplayAnswer(w.q, w.r.userAnswer);
    const correctDisp = getDisplayAnswer(w.q, w.r.correctAnswer);
    html += `<div class="wrong-item">
      <div class="wrong-q">${badgeMap[w.q.type] || ''} ${w.q.question}</div>
      <div class="wrong-detail">
        <span class="label">你的答案：</span><span class="your-ans">${userDisp}</span><br>
        <span class="label">正确答案：</span><span class="correct-ans">${correctDisp}</span><br>
        <span class="label">考点解析：</span>${w.q.explanation}
      </div>
    </div>`;
  });
  document.getElementById('wrongListContent').innerHTML = html;
}

// ========== Reset ==========
function resetAll() {
  userAnswers = new Array(TOTAL).fill(null);
  submitted = new Array(TOTAL).fill(false);
  results = new Array(TOTAL).fill(null);
  currentQ = 0;
  navOpen = false;
  document.getElementById('navPanel').classList.remove('open');
  render();
}

// ========== Submit All ==========
function submitAll() {
  saveHistory();
  showStats();
}

// ========== History (localStorage) ==========
function getHistory() {
  try { return JSON.parse(localStorage.getItem('quizHistory')) || []; } catch(e) { return []; }
}

function saveHistory() {
  const answered = results.filter(r => r !== null).length;
  if (answered === 0) return;
  const correctCount = results.filter(r => r && r.correct).length;
  const wrongCount = results.filter(r => r && !r.correct).length;
  const rate = answered > 0 ? Math.round((correctCount / answered) * 100) : 0;
  const history = getHistory();
  history.unshift({
    time: new Date().toLocaleString('zh-CN'),
    answered: answered,
    correct: correctCount,
    wrong: wrongCount,
    rate: rate,
    total: TOTAL
  });
  if (history.length > 50) history.length = 50; // keep max 50 records
  try { localStorage.setItem('quizHistory', JSON.stringify(history)); } catch(e) {}
}

function showHistory() {
  document.getElementById('questionArea').classList.add('hidden');
  document.getElementById('statsPage').classList.add('hidden');
  document.getElementById('wrongPage').classList.add('hidden');
  document.getElementById('codeRefPage').classList.add('hidden');
  document.getElementById('historyPage').classList.remove('hidden');

  const history = getHistory();
  if (history.length === 0) {
    document.getElementById('historyContent').innerHTML =
      '<div style="text-align:center;padding:40px 0;color:#999;">暂无历史记录</div>';
    return;
  }

  let html = '';
  history.forEach((h, i) => {
    const color = h.rate >= 80 ? '#43a047' : h.rate >= 60 ? '#fb8c00' : '#e53935';
    html += `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #eee;flex-wrap:wrap;gap:6px;">
      <span style="font-size:13px;color:#888;">${h.time}</span>
      <span style="font-size:14px;">${h.answered}/${h.total} 题</span>
      <span style="font-size:14px;font-weight:600;color:${color};">${h.correct} 对 / ${h.wrong} 错</span>
      <span style="font-size:18px;font-weight:700;color:${color};">${h.rate}%</span>
    </div>`;
  });
  document.getElementById('historyContent').innerHTML = html;
}

function clearHistory() {
  if (!confirm('确定清空所有历史记录？')) return;
  try { localStorage.removeItem('quizHistory'); } catch(e) {}
  showHistory();
}

function saveAndReset() {
  saveHistory();
  if (!confirm('当前成绩已保存到历史记录，确定重新刷题？')) return;
  userAnswers = new Array(TOTAL).fill(null);
  submitted = new Array(TOTAL).fill(false);
  results = new Array(TOTAL).fill(null);
  currentQ = 0;
  navOpen = false;
  document.getElementById('navPanel').classList.remove('open');
  render();
}

// ========== Init ==========
render();
</script>
</body>
